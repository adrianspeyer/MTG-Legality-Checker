<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src https://cards.scryfall.io https://c1.scryfall.com; connect-src https://api.scryfall.com; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
<meta name="referrer" content="no-referrer">
<title>MTG Arena Deck Analyzer v7</title>
<style>
  :root {
    --bg-deep: #0d0f14;
    --bg-card: #161922;
    --bg-input: #1c1f2b;
    --border: #2a2e3d;
    --text: #e2e4eb;
    --text-muted: #8890a4;
    --text-dim: #5c6378;
    --gold: #eebb55;
    --mythic: #d86638;
    --rare: #c9a84c;
    --uncommon: #8fbcd4;
    --common: #a8aebf;
    --green: #2dd47b;
    --red: #e94560;
    --purple: #a56de2; 
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-deep); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding-bottom: 50px; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  h1 { grid-column: 1 / -1; text-align: center; font-size: 24px; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }
  .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  textarea { width: 100%; height: 200px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: monospace; font-size: 13px; padding: 14px; resize: vertical; outline: none; }
  textarea:focus { border-color: var(--gold); }
  .controls { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 10px; }
  select { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; outline: none; }
  .btn { background: linear-gradient(135deg, #c9a84c, #a8872e); color: #0d0f14; border: none; border-radius: 8px; padding: 0 24px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: filter 0.2s; }
  .btn:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.5; cursor: wait; filter: grayscale(1); }
  .main-col { display: flex; flex-direction: column; gap: 20px; }
  .side-col { display: flex; flex-direction: column; gap: 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .stat-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 10px 5px; text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; display: block; }
  .stat-lbl { font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }
  .curve-box { height: 120px; display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; padding: 10px 0; }
  .bar-col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; transition: height 0.3s; min-height: 1px; }
  .bar-lbl { font-size: 10px; margin-top: 5px; color: var(--text-muted); }
  .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .section-head { padding: 12px 16px; background: rgba(255,255,255,0.03); cursor: pointer; font-size: 13px; font-weight: 600; text-transform: uppercase; display: flex; align-items: center; gap: 8px; user-select: none; }
  .section-body { overflow: hidden; max-height: 2000px; transition: max-height 0.3s; }
  .section-body.closed { max-height: 0; }
  .row { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; font-size: 13px; position: relative; cursor: default; }
  .row:hover { background: rgba(255,255,255,0.02); }
  .row:last-child { border-bottom: none; }
  .qty { width: 30px; color: var(--text-dim); font-family: monospace; }
  .name { flex: 1; color: var(--text); border-bottom: 1px dotted var(--text-dim); cursor: help; }
  .name:hover { color: var(--gold); border-color: var(--gold); }
  .mana { margin-left: 10px; font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
  .rarity-dot { width: 8px; height: 8px; border-radius: 50%; margin-left: 10px; display: inline-block; }
  .copy-btn-row { display: flex; gap: 8px; margin-top: 15px; }
  .copy-btn { flex: 1; background: transparent; border: 1px solid var(--green); color: var(--green); border-radius: 8px; padding: 10px 6px; font-weight: 600; font-size: 12px; cursor: pointer; display: none; transition: all 0.2s; text-align: center; }
  .copy-btn:hover { background: rgba(45, 212, 123, 0.1); }
  .copy-btn.ok { background: var(--green); color: #000; border-color: var(--green); }
  .copy-btn.illegal-btn { border-color: var(--red); color: var(--red); }
  .copy-btn.illegal-btn:hover { background: rgba(233, 69, 96, 0.1); }
  .copy-btn.illegal-btn.ok { background: var(--red); color: #fff; border-color: var(--red); }
  #preview { position: fixed; width: 220px; border-radius: 12px; border: 2px solid #000; box-shadow: 0 8px 25px rgba(0,0,0,0.8); pointer-events: none; z-index: 9999; opacity: 0; transition: opacity 0.15s; background: var(--bg-card); display: none; }
  #preview.show { opacity: 1; display: block; }
  .err { color: var(--red); font-size: 13px; margin-top: 8px; text-align: center; }
  .hidden { display: none; }
  .r-common { background: var(--common); }
  .r-uncommon { background: var(--uncommon); }
  .r-rare { background: var(--rare); }
  .r-mythic { background: var(--mythic); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Arena Deck Analyzer</h1>
  <div class="main-col">
    <div class="panel">
      <textarea id="deck" placeholder="Paste from Arena, Moxfield, Decked Builder, ManaBox...

Commander
1 Atraxa, Praetors' Voice

Deck
1 Sol Ring
1 Arcane Signet
1 Ojer Taq, Deepest Foundation // Temple of Civilization"></textarea>
      <div class="controls">
        <select id="fmt">
          <option value="historicbrawl" selected>Historic Brawl</option>
          <option value="standardbrawl">Standard Brawl</option>
          <option value="timeless">Timeless</option>
          <option value="historic">Historic</option>
          <option value="explorer">Explorer</option>
          <option value="standard">Standard</option>
          <option value="alchemy">Alchemy</option>
        </select>
        <button class="btn" id="go">Analyze</button>
      </div>
      <div class="err" id="err"></div>
    </div>
    <div id="deck-list"></div>
  </div>
  <div class="side-col">
    <div id="stats-panel" class="hidden">
      <div class="panel">
        <label>Wildcards Needed</label>
        <div class="stats-grid" style="margin-top:10px">
          <div class="stat-box" style="border-color:var(--mythic)">
            <span class="stat-num" style="color:var(--mythic)" id="wc-m">0</span><span class="stat-lbl">Mythic</span>
          </div>
          <div class="stat-box" style="border-color:var(--rare)">
            <span class="stat-num" style="color:var(--rare)" id="wc-r">0</span><span class="stat-lbl">Rare</span>
          </div>
          <div class="stat-box" style="border-color:var(--uncommon)">
            <span class="stat-num" style="color:var(--uncommon)" id="wc-u">0</span><span class="stat-lbl">Unc</span>
          </div>
          <div class="stat-box" style="border-color:var(--common)">
            <span class="stat-num" style="color:var(--common)" id="wc-c">0</span><span class="stat-lbl">Com</span>
          </div>
        </div>
      </div>
      <div class="panel">
        <label>Mana Curve</label>
        <div class="curve-box" id="curve-chart"></div>
      </div>
      <div class="panel">
        <label>Legality Check</label>
        <div id="legality-summary" style="margin-top:10px; font-size:14px;"></div>
        <div class="copy-btn-row">
          <button id="copy-legal-btn" class="copy-btn">Copy Legal</button>
          <button id="copy-illegal-btn" class="copy-btn illegal-btn">Copy Illegal</button>
        </div>
      </div>
    </div>
  </div>
</div>
<img id="preview" src="" alt="Card Preview">
<script>
// ============================================================
// MTG Arena Deck Analyzer v7 - Security-Hardened
// Changes from v6:
//   - All innerHTML with user/API data replaced with safe DOM construction
//   - Content Security Policy restricting scripts, images, connections
//   - Image URLs validated against Scryfall domain allowlist
//   - API response shape validated before accessing properties
//   - Clipboard errors handled gracefully with fallback messaging
//   - Global state encapsulated in IIFE (no window._ leakage)
//   - Inline onclick handlers removed; listeners attached via JS
//   - Referrer policy meta tag added (no-referrer)
//   - Rate-limit debounce on analyze to prevent API spam
//   - Input size limits (50KB text, 500 cards, 200 char names)
//   - Card qty clamped 1-999
//   - Preview img src cleared on mouseout
//   - Ctrl+Enter keyboard shortcut
// ============================================================
(function() {
  'use strict';

  let _legalCards = [];
  let _illegalCards = [];
  let _lastRunTime = 0;
  const RUN_COOLDOWN_MS = 2000;

  function isValidImageUrl(url) {
    if (typeof url !== 'string' || !url) return false;
    try {
      const parsed = new URL(url);
      const allowed = ['cards.scryfall.io', 'c1.scryfall.com'];
      return parsed.protocol === 'https:' && allowed.includes(parsed.hostname);
    } catch { return false; }
  }

  function safeRarity(rarity) {
    const valid = ['common', 'uncommon', 'rare', 'mythic'];
    return valid.includes(rarity) ? rarity : 'common';
  }

  function safeStr(obj, key) {
    const val = obj?.[key];
    return typeof val === 'string' ? val : '';
  }

  function safeNum(obj, key) {
    const val = obj?.[key];
    return typeof val === 'number' && isFinite(val) ? val : 0;
  }

  function createEl(tag, attrs, children) {
    const el = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'textContent') el.textContent = v;
        else if (k === 'className') el.className = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
        else if (k.startsWith('data-')) el.setAttribute(k, v);
        else el[k] = v;
      }
    }
    if (children) {
      for (const child of children) {
        if (typeof child === 'string') el.appendChild(document.createTextNode(child));
        else if (child) el.appendChild(child);
      }
    }
    return el;
  }

  function parse(text) {
    const lines = text.trim().split('\n'), cards = [];
    let sec = 'deck';
    const sectionMap = {
      'commander': 'commander', 'command zone': 'commander',
      'companion': 'companion', 'deck': 'deck', 'sideboard': 'sideboard',
    };
    const sectionLineRe = /^\/?\/?\.?\s*(command zone|commander|companion|deck|sideboard|main deck|creatures?|spells?|lands?|instants?|sorceries|enchantments?|artifacts?|planeswalkers?|battles?)(\s*\(\d+\))?$/i;
    const skipLineRe = /^(built with |exported |generated |\/\/\s*$|about:|format:|date:)/i;

    for (let l of lines) {
      l = l.trim();
      if (!l) continue;
      if (skipLineRe.test(l)) continue;
      const secMatch = l.match(sectionLineRe);
      if (secMatch) {
        const key = secMatch[1].toLowerCase();
        if (sectionMap[key]) sec = sectionMap[key];
        else if (key === 'main deck') sec = 'deck';
        continue;
      }
      const m = l.match(/^(\d+)\s*x?\s+(.+)$/i);
      let qty = 1, rawName = l;
      if (m) {
        qty = Math.min(Math.max(parseInt(m[1], 10) || 1, 1), 999);
        rawName = m[2].trim();
      }
      rawName = rawName.replace(/\s+\([A-Z0-9]+\)\s*\S*$/, '').trim();
      if (rawName.length > 200) rawName = rawName.substring(0, 200);
      const fullName = rawName;
      const lookupName = rawName.includes(' // ') ? rawName.split(' // ')[0].trim() : rawName;
      cards.push({ qty, name: lookupName, displayName: fullName, sec });
    }
    return cards;
  }

  async function fetchBatch(names) {
    const uniq = [...new Set(names)];
    const results = [];
    for (let i = 0; i < uniq.length; i += 75) {
      const batch = uniq.slice(i, i + 75).map(n => ({ name: n }));
      const resp = await fetch('https://api.scryfall.com/cards/collection', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identifiers: batch })
      });
      if (!resp.ok) { console.warn('Scryfall returned ' + resp.status); continue; }
      const data = await resp.json();
      if (!data || !Array.isArray(data.data)) { console.warn('Bad response shape'); continue; }
      results.push(...data.data);
      if (i + 75 < uniq.length) await new Promise(r => setTimeout(r, 100));
    }
    return results;
  }

  async function run() {
    const now = Date.now();
    if (now - _lastRunTime < RUN_COOLDOWN_MS) return;
    _lastRunTime = now;

    const txt = document.getElementById('deck').value;
    const fmtSelect = document.getElementById('fmt');
    const fmt = fmtSelect.value;
    const fmtLabel = fmtSelect.selectedOptions[0].text;
    const btn = document.getElementById('go');
    const err = document.getElementById('err');

    if (!txt.trim()) { err.textContent = 'Please enter a decklist.'; return; }
    if (txt.length > 50000) { err.textContent = 'Decklist is too large (50 KB max).'; return; }

    btn.disabled = true; btn.textContent = 'Loading...';
    err.textContent = '';
    document.getElementById('deck-list').innerHTML = '';
    document.getElementById('stats-panel').classList.add('hidden');
    document.getElementById('copy-legal-btn').style.display = 'none';
    document.getElementById('copy-illegal-btn').style.display = 'none';

    try {
      const cards = parse(txt);
      if (cards.length === 0) { err.textContent = 'No valid card lines found.'; return; }
      if (cards.length > 500) { err.textContent = 'Too many entries (500 max).'; return; }

      const data = await fetchBatch(cards.map(c => c.name));
      const map = {};
      data.forEach(d => {
        if (typeof d.name !== 'string') return;
        map[d.name.toLowerCase()] = d;
        if (d.name.includes(' // ')) map[d.name.split(' // ')[0].trim().toLowerCase()] = d;
      });

      const res = { legal: [], illegal: [], notOnArena: [], banned: [], notFound: [] };
      const stats = { m: 0, r: 0, u: 0, c: 0, curve: [0,0,0,0,0,0,0,0] };
      const arenaFormats = ['historic','timeless','explorer','brawl','standard','alchemy','historicbrawl'];

      for (const c of cards) {
        const d = map[c.name.toLowerCase()];
        if (!d) { res.notFound.push(c); continue; }
        const cardObj = { ...c, data: d };
        const legalities = d.legalities;
        if (!legalities || typeof legalities !== 'object') { res.notFound.push(c); continue; }
        const onArena = arenaFormats.some(f => ['legal','restricted','banned'].includes(legalities[f]));
        if (!onArena) { res.notOnArena.push(cardObj); continue; }
        const leg = legalities[fmt];
        if (leg === 'banned') { res.banned.push(cardObj); continue; }
        if (leg === 'not_legal') { res.illegal.push({...cardObj, reason: 'Not ' + fmtLabel + ' legal'}); continue; }
        if (leg === 'restricted' && c.qty > 1) { res.illegal.push({...cardObj, reason: 'Restricted (1 max)'}); continue; }
        res.legal.push(cardObj);
        if (!safeStr(d, 'type_line').includes('Basic Land')) {
          const r = safeStr(d, 'rarity');
          if (r === 'mythic') stats.m += c.qty;
          else if (r === 'rare') stats.r += c.qty;
          else if (r === 'uncommon') stats.u += c.qty;
          else stats.c += c.qty;
        }
        if (!safeStr(d, 'type_line').includes('Land')) {
          let cmc = Math.floor(safeNum(d, 'cmc'));
          if (cmc > 7) cmc = 7;
          if (cmc < 0) cmc = 0;
          stats.curve[cmc] += c.qty;
        }
      }

      render(res, stats, fmtLabel);
      _legalCards = res.legal;
      _illegalCards = [...res.notOnArena, ...res.banned, ...res.illegal, ...res.notFound];
    } catch (e) {
      console.error(e);
      err.textContent = 'Error connecting to Scryfall API.';
    } finally {
      btn.disabled = false; btn.textContent = 'Analyze';
    }
  }

  function render(res, stats, fmt) {
    document.getElementById('wc-m').textContent = stats.m;
    document.getElementById('wc-r').textContent = stats.r;
    document.getElementById('wc-u').textContent = stats.u;
    document.getElementById('wc-c').textContent = stats.c;

    const maxH = Math.max(...stats.curve, 1);
    const chart = document.getElementById('curve-chart');
    chart.innerHTML = '';
    stats.curve.forEach((val, i) => {
      const h = (val / maxH) * 100;
      const label = i === 7 ? '7+' : String(i);
      const bar = createEl('div', { className: 'bar', style: { height: h + '%', background: val > 0 ? 'var(--gold)' : 'var(--border)' } });
      const barLbl = createEl('div', { className: 'bar-lbl', textContent: label });
      chart.appendChild(createEl('div', { className: 'bar-col' }, [bar, barLbl]));
    });

    const legDiv = document.getElementById('legality-summary');
    legDiv.innerHTML = '';
    const totalIssues = res.illegal.length + res.banned.length + res.notOnArena.length + res.notFound.length;
    if (totalIssues === 0) {
      legDiv.appendChild(createEl('span', { textContent: '\u2713 Deck is Legal in ' + fmt, style: { color: 'var(--green)' } }));
    } else {
      legDiv.appendChild(createEl('div', { textContent: 'Issues Found:', style: { color: 'var(--red)' } }));
      if (res.notOnArena.length) legDiv.appendChild(createEl('div', { textContent: '\u2022 ' + res.notOnArena.length + ' Not on Arena' }));
      if (res.banned.length) legDiv.appendChild(createEl('div', { textContent: '\u2022 ' + res.banned.length + ' Banned' }));
      if (res.illegal.length) legDiv.appendChild(createEl('div', { textContent: '\u2022 ' + res.illegal.length + ' Not Legal' }));
      if (res.notFound.length) legDiv.appendChild(createEl('div', { textContent: '\u2022 ' + res.notFound.length + ' Not Found' }));
    }

    if (res.legal.length > 0) document.getElementById('copy-legal-btn').style.display = 'block';
    if (totalIssues > 0) document.getElementById('copy-illegal-btn').style.display = 'block';
    document.getElementById('stats-panel').classList.remove('hidden');

    const deckList = document.getElementById('deck-list');
    deckList.innerHTML = '';
    if (res.notOnArena.length) deckList.appendChild(buildSection('Not On Arena', res.notOnArena, 'var(--purple)'));
    if (res.banned.length) deckList.appendChild(buildSection('Banned', res.banned, 'var(--red)'));
    if (res.illegal.length) deckList.appendChild(buildSection('Illegal / Errors', res.illegal, 'var(--red)'));
    if (res.notFound.length) deckList.appendChild(buildSection('Not Found', res.notFound, 'var(--text-dim)'));

    const creatures = res.legal.filter(c => safeStr(c.data, 'type_line').includes('Creature'));
    const lands = res.legal.filter(c => safeStr(c.data, 'type_line').includes('Land') && !safeStr(c.data, 'type_line').includes('Creature'));
    const spells = res.legal.filter(c => !safeStr(c.data, 'type_line').includes('Creature') && !safeStr(c.data, 'type_line').includes('Land'));
    if (creatures.length) deckList.appendChild(buildSection('Creatures (' + countCards(creatures) + ')', creatures, 'var(--text)'));
    if (spells.length) deckList.appendChild(buildSection('Spells (' + countCards(spells) + ')', spells, 'var(--text)'));
    if (lands.length) deckList.appendChild(buildSection('Lands (' + countCards(lands) + ')', lands, 'var(--text)'));
  }

  function countCards(arr) { return arr.reduce((a, b) => a + b.qty, 0); }

  function buildSection(title, cards, color) {
    const wrapper = createEl('div', { className: 'section', style: { borderLeft: '3px solid ' + color, marginBottom: '10px' } });
    const head = createEl('div', { className: 'section-head', textContent: title, style: { color: color } });
    const body = createEl('div', { className: 'section-body' });
    head.addEventListener('click', () => body.classList.toggle('closed'));

    for (const c of cards) {
      const d = c.data || {};
      let img = d.image_uris?.normal;
      if (!img && d.card_faces) img = d.card_faces?.[0]?.image_uris?.normal;
      const safeImg = isValidImageUrl(img) ? img : '';
      let mana = safeStr(d, 'mana_cost');
      if (!mana && d.card_faces) mana = safeStr(d.card_faces[0] || {}, 'mana_cost');
      mana = mana.replace(/[{}]/g, '');
      const label = c.displayName || c.name;
      const rarity = safeRarity(safeStr(d, 'rarity'));

      const row = createEl('div', { className: 'row' });
      row.appendChild(createEl('span', { className: 'qty', textContent: String(c.qty) }));
      const nameEl = createEl('span', { className: 'name', textContent: label });
      if (safeImg) nameEl.setAttribute('data-img', safeImg);
      row.appendChild(nameEl);
      row.appendChild(createEl('span', { className: 'mana', textContent: mana }));
      row.appendChild(createEl('span', { className: 'rarity-dot r-' + rarity, title: rarity }));
      if (c.reason) {
        row.appendChild(createEl('span', { textContent: c.reason, style: { color: 'var(--red)', fontSize: '11px', marginLeft: 'auto' } }));
      }
      body.appendChild(row);
    }
    wrapper.appendChild(head);
    wrapper.appendChild(body);
    return wrapper;
  }

  function formatCardsForCopy(cards) {
    const secs = {};
    for (const c of cards) { const s = c.sec || 'deck'; if(!secs[s]) secs[s]=[]; secs[s].push(c); }
    let t = '';
    if (secs['commander']) {
      t += 'Commander\n' + secs['commander'].map(c => c.qty + ' ' + (c.displayName || c.name)).join('\n') + '\n\n';
      delete secs['commander'];
    }
    if (secs['companion']) {
      t += 'Companion\n' + secs['companion'].map(c => c.qty + ' ' + (c.displayName || c.name)).join('\n') + '\n\n';
      delete secs['companion'];
    }
    for (const s in secs) {
      t += s.charAt(0).toUpperCase() + s.slice(1) + '\n';
      t += secs[s].map(c => c.qty + ' ' + (c.displayName || c.name)).join('\n') + '\n\n';
    }
    return t.trim();
  }

  function copyCards(type) {
    const cards = type === 'legal' ? _legalCards : _illegalCards;
    if (!cards.length) return;
    const text = formatCardsForCopy(cards);
    const btnId = type === 'legal' ? 'copy-legal-btn' : 'copy-illegal-btn';
    const b = document.getElementById(btnId);
    navigator.clipboard.writeText(text).then(() => {
      const oldText = b.textContent;
      b.textContent = '\u2713 Copied!';
      b.classList.add('ok');
      setTimeout(() => { b.textContent = oldText; b.classList.remove('ok'); }, 2000);
    }).catch(function(clipErr) {
      console.warn('Clipboard write failed:', clipErr);
      b.textContent = 'Copy failed \u2014 try Ctrl+C';
      setTimeout(() => { b.textContent = type === 'legal' ? 'Copy Legal' : 'Copy Illegal'; }, 3000);
    });
  }

  const preview = document.getElementById('preview');
  document.addEventListener('mouseover', function(e) {
    if (e.target.classList.contains('name')) {
      const imgUrl = e.target.getAttribute('data-img');
      if (imgUrl && isValidImageUrl(imgUrl)) {
        preview.src = imgUrl;
        preview.classList.add('show');
      }
    }
  });
  document.addEventListener('mouseout', function(e) {
    if (e.target.classList.contains('name')) {
      preview.classList.remove('show');
      preview.removeAttribute('src');
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (preview.classList.contains('show')) {
      let x = e.clientX + 15, y = e.clientY + 15;
      if (x + 220 > window.innerWidth) x = e.clientX - 235;
      if (y + 300 > window.innerHeight) y = e.clientY - 300;
      preview.style.left = x + 'px';
      preview.style.top = y + 'px';
    }
  });

  document.getElementById('go').addEventListener('click', run);
  document.getElementById('copy-legal-btn').addEventListener('click', function() { copyCards('legal'); });
  document.getElementById('copy-illegal-btn').addEventListener('click', function() { copyCards('illegal'); });
  document.getElementById('deck').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); run(); }
  });
})();
</script>
</body>
</html>
